<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Development Countdown Timer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body {
      background: #222;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 3rem; margin: 20px 0 10px; }
    header p { font-size: 1.2rem; color: #ccc; }

    #code-animation pre {
      background: #1d1f21;
      padding: 15px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #0f0;
      border-right: 2px solid rgba(255,255,255,0.75);
      white-space: nowrap;
      overflow: hidden;
      width: 0ch;
      animation: typing 4s steps(60, end) forwards, blink 0.75s step-end infinite;
    }
    @keyframes typing { from { width: 0ch; } to { width: 60ch; } }
    @keyframes blink { 50% { border-color: transparent; } }

    .countdown-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    .countdown-box {
      background: #333;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      min-width: 70px;
      margin: 0 10px;
      animation: glow 1s ease-in-out infinite alternate;
    }
    .countdown-box span {
      display: block;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .countdown-box label {
      font-size: 0.9rem;
      color: #aaa;
      text-transform: uppercase;
    }
    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }
    .animate { animation: flip 0.5s ease-in-out; }
    @keyframes glow {
      0% { box-shadow: 0 0 5px rgba(255,255,255,0.3); }
      100% { box-shadow: 0 0 20px rgba(255,255,255,0.8); }
    }

    .floating-home-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #636466;
      color: #e9eee9;
      border: none;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    }
    .floating-home-button:hover { background-color: #2c2e2c; transform: scale(1.1); }
    .floating-home-button:active { transform: scale(1); }
  </style>
</head>
<body>
  <header>
    <h1>Site under construction</h1>
    <p>Get ready for something unique</p>
  </header>

  <div id="code-animation">
    <pre>/* Before you go, please enjoy this unique page while you note the time remaining... */</pre>
  </div>

  <div class="countdown-container">
    <div class="countdown-box"><span id="days">00</span><label>Days</label></div>
    <div class="countdown-box"><span id="hours">00</span><label>Hours</label></div>
    <div class="countdown-box"><span id="minutes">00</span><label>Minutes</label></div>
    <div class="countdown-box"><span id="seconds">00</span><label>Seconds</label></div>
  </div>

  <script>
    const countDownDate = new Date("May 1, 2026 23:59:59").getTime();
    let prev = {days:null,hours:null,minutes:null,seconds:null};

    const countdownFunction = setInterval(() => {
      const now = Date.now();
      const distance = countDownDate - now;

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((distance % (1000*60)) / 1000);

      const update = (id,val,prevVal) => {
        const el = document.getElementById(id);
        const str = val < 10 ? "0"+val : val;
        if (prevVal !== str) {
          el.textContent = str;
          el.classList.add("animate");
          setTimeout(()=>el.classList.remove("animate"),500);
        }
        return str;
      };

      prev.days = update("days",days,prev.days);
      prev.hours = update("hours",hours,prev.hours);
      prev.minutes = update("minutes",minutes,prev.minutes);
      prev.seconds = update("seconds",seconds,prev.seconds);

      if (distance < 0) {
        clearInterval(countdownFunction);
        document.querySelector(".countdown-container").innerHTML = "<h2>Time's up!</h2>";
      }
    },1000);
  </script>

  <button class="floating-home-button fa fa-home" onclick="goHome()" aria-label="Home"></button>
  <script>
    function goHome() { window.location.href = "https://aboutnathangrahambusse.web.app"; }
  </script>
</body>
</html>
